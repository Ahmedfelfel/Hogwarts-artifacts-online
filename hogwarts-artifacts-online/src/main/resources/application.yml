spring:
  application:
    name: hogwarts-artifacts-online
  datasource:
    url: jdbc:h2:mem:hogwarts
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
    jpa:
        hibernate:
            ddl-auto: update
            debug: true
        show-sql: true

        properties:
            hibernate:
            format_sql: true




